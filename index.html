<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiral LED Tube Visualizer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="canvas-container">
            <canvas id="spiralCanvas"></canvas>
            <div id="tooltip" class="tooltip"></div>
        </div>

        <div class="control-panel">
            <h2>Spiral Visualizer</h2>

            <div class="control-section">
                <h3>Wall</h3>
                <div class="number-row">
                    <label>Width (m)</label>
                    <input type="number" id="wallWidth" min="1" max="20" step="0.1" value="3">
                    <label>Height (m)</label>
                    <input type="number" id="wallHeight" min="1" max="20" step="0.1" value="3">
                </div>
            </div>

            <div class="control-section">
                <h3>Spiral Geometry</h3>
                <label>Start Angle (deg): <span id="startAngleVal">0</span></label>
                <input type="range" id="startAngle" min="0" max="360" step="1" value="0">
                <label>Inner Diameter (mm): <span id="innerDiameterVal">0</span></label>
                <input type="range" id="innerDiameter" min="0" max="500" step="5" value="0">
                <label>Spiral Spacing (mm): <span id="spiralSpacingVal">22</span></label>
                <input type="range" id="spiralSpacing" min="10" max="300" step="1" value="22">
                <label>Tube Diameter (mm): <span id="tubeDiameterVal">22</span></label>
                <input type="range" id="tubeDiameter" min="5" max="50" step="1" value="22">
            </div>

            <div class="control-section">
                <h3>Segments</h3>
                <label>Segment Length (cm): <span id="segmentLengthVal">200</span></label>
                <input type="range" id="segmentLength" min="10" max="500" step="5" value="200">
                <label>Segment Gap (mm): <span id="segmentGapVal">0</span></label>
                <input type="range" id="segmentGap" min="0" max="50" step="1" value="0">
            </div>

            <div class="control-section">
                <h3>LEDs / Power</h3>
                <div class="number-row">
                    <label>Pitch (mm)</label>
                    <input type="number" id="ledPitch" min="5" max="100" step="0.01" value="10.4">
                    <label>W/m</label>
                    <input type="number" id="wattsPerMeter" min="1" max="60" step="0.1" value="14.4">
                </div>
            </div>

            <div class="control-section">
                <h3>Display Options</h3>
                <label>Grid Size (m): <span id="gridSizeVal">1.0</span></label>
                <input type="range" id="gridSize" min="0.1" max="2" step="0.1" value="1.0">
                <div class="checkbox-grid">
                    <label><input type="checkbox" id="showLeds" checked> LEDs</label>
                    <label><input type="checkbox" id="showGrid" checked> Grid</label>
                    <label><input type="checkbox" id="showWallBorder" checked> Wall</label>
                </div>
            </div>

            <div class="control-section">
                <h3>View</h3>
                <button class="btn" id="resetViewBtn">Reset View</button>
                <button class="btn btn-primary" id="saveSettingsBtn">Save Settings</button>
            </div>

            <div class="control-section">
                <h3>Info</h3>
                <div class="info-box">
                    <div id="spiralLength" class="info-line highlight">Spiral Length: --</div>
                    <div id="totalWatts" class="info-line highlight">Total Power: --</div>
                    <div id="segmentCount" class="info-line">Segments: --</div>
                    <div id="ledCount" class="info-line">Total LEDs: --</div>
                    <div id="ledsPerMeter" class="info-line">LEDs/m: --</div>
                    <div id="ledsPerSegment" class="info-line">LEDs/segment: --</div>
                    <div id="turnsCount" class="info-line">Turns: --</div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
