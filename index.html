<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiral LED Tube Visualizer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="canvas-container">
            <canvas id="spiralCanvas"></canvas>
            <div id="tooltip" class="tooltip"></div>
            <button class="panel-restore" id="panelRestore" title="Show controls">☰</button>
        </div>

        <div class="control-panel" id="controlPanel">
            <div class="panel-header">
                <h2>Spiral Visualizer</h2>
                <button class="minimize-btn" id="minimizeBtn" title="Minimize panel">⟩⟩</button>
            </div>
            <div class="view-toggle">
                <a href="index.html" class="active">2D</a>
                <a href="index-3d.html">3D</a>
            </div>

            <div class="control-section">
                <h3>Wall</h3>
                <div class="number-row">
                    <label>Width (m)</label>
                    <input type="number" id="wallWidth" min="1" max="20" step="0.1" value="3">
                    <label>Height (m)</label>
                    <input type="number" id="wallHeight" min="1" max="20" step="0.1" value="3">
                </div>
            </div>

            <div class="control-section">
                <h3>Spiral Geometry</h3>
                <label>Start Angle (deg): <span id="startAngleVal">120</span></label>
                <input type="range" id="startAngle" min="0" max="360" step="1" value="120">
                <label>Inner Diameter (mm): <span id="innerDiameterVal">186</span></label>
                <input type="range" id="innerDiameter" min="0" max="500" step="2" value="186">
                <label>Tube Pitch — center-to-center (mm): <span id="spiralSpacingVal">26.0</span></label>
                <input type="range" id="spiralSpacing" min="2" max="300" step="0.1" value="26">
                <label>Tube Width (mm): <span id="tubeDiameterVal">16</span></label>
                <input type="range" id="tubeDiameter" min="5" max="50" step="1" value="16">
                <label><input type="checkbox" id="ccwWinding" checked> CCW winding</label>
            </div>

            <div class="control-section">
                <h3>Segments</h3>
                <label>LED Tube Amount (segments): <span id="segmentMountsVal">31</span></label>
                <input type="range" id="segmentMounts" min="1" max="200" step="1" value="31">
                <label>Segment Length (cm): <span id="segmentLengthVal">500</span></label>
                <input type="range" id="segmentLength" min="10" max="1000" step="5" value="500">
                <label>Segment Gap (mm): <span id="segmentGapVal">0</span></label>
                <input type="range" id="segmentGap" min="0" max="5" step="0.5" value="0">
            </div>

            <div class="control-section">
                <h3>LEDs / Power</h3>
                <label>LEDs/m</label>
                <input type="number" id="ledsPerMeter" min="10" max="200" step="0.1" value="96.2">
                <label>Pixels/m</label>
                <input type="number" id="pixelsPerMeter" min="1" max="120" step="1" value="30">
                <label>W/m</label>
                <input type="number" id="wattsPerMeter" min="1" max="60" step="0.1" value="14.4">
            </div>

            <div class="control-section">
                <h3>Display Options</h3>
                <label>Grid Size (m): <span id="gridSizeVal">1.0</span></label>
                <input type="range" id="gridSize" min="0.1" max="2" step="0.1" value="1.0">
                <div class="checkbox-grid">
                    <label><input type="checkbox" id="showLeds" checked> LEDs</label>
                    <label><input type="checkbox" id="showTube" checked> Tube</label>
                    <label><input type="checkbox" id="showPixelGroups" checked> Pixel groups</label>
                    <label><input type="checkbox" id="showImage"> Image</label>
                    <label><input type="checkbox" id="showGrid" checked> Grid</label>
                    <label><input type="checkbox" id="showWallBorder" checked> Wall</label>
                    <label><input type="checkbox" id="showSegmentEnds" checked> Segment ends</label>
                </div>
            </div>

            <div class="control-section">
                <h3>View</h3>
                <button class="btn" id="resetViewBtn">Reset View</button>
                <button class="btn btn-primary" id="saveSettingsBtn">Save Settings</button>
            </div>

            <div class="control-section">
                <h3>Info</h3>
                <div class="info-box">
                    <div id="spiralLength" class="info-line highlight">Spiral Length: --</div>
                    <div id="totalWatts" class="info-line highlight">Total Power: --</div>
                    <div id="segmentCount" class="info-line">Segments: --</div>
                    <div id="ledCount" class="info-line">Total LEDs: --</div>
                    <div id="ledsPerMeterDisp" class="info-line">LEDs/m: --</div>
                    <div id="pitchDisp" class="info-line">Pitch: -- mm</div>
                    <div id="pixelsPerMeterDisp" class="info-line">Pixels/m: --</div>
                    <div id="pixelCount" class="info-line">Total pixels: --</div>
                    <div id="ledsPerSegment" class="info-line">LEDs/segment: --</div>
                    <div id="turnsCount" class="info-line">Turns: --</div>
                </div>
            </div>

            <div class="repo-link-footer">
                <a href="https://github.com/stephanschulz/spiral-viz/" target="_blank" rel="noopener noreferrer" aria-label="View on GitHub">
                    <img src="https://img.shields.io/badge/View_on_GitHub-181717?style=for-the-badge&logo=github&logoColor=white" alt="View on GitHub">
                </a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        (function () {
            const container = document.querySelector('.container');
            const relayout = () => window.dispatchEvent(new Event('resize'));
            document.getElementById('minimizeBtn').addEventListener('click', () => {
                container.classList.add('minimized'); relayout();
            });
            document.getElementById('panelRestore').addEventListener('click', () => {
                container.classList.remove('minimized'); relayout();
            });
        })();
    </script>
</body>
</html>
